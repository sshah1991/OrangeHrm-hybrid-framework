name: Playwright Tests
on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci

    # 1. Get the version so the cache key is unique to your Playwright version
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

    # 2. Check for existing browsers in the cache
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # 3. ONLY install browsers if the cache was NOT found
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    # 4. If cache WAS found, we still need to install system dependencies (fast)
    - name: Install Playwright Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        Valid_AdminUserName: ${{ secrets.ADMIN_USER }}
        Valid_AdminPassword: ${{ secrets.ADMIN_PASS }}
        InValid_AdminUserName: ${{ secrets.INVALID_ADMINUSERNAME }}
        InValid_AdminPassword: ${{ secrets.INVALID_ADMINPASSWORD }}
        
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30